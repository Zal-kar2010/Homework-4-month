<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 class="text-center mb-4">{{ title }}</h1>
        
        <!-- Навигация -->
        <div class="text-center mb-4">
            <a href="{% url 'book_ru' %}" class="btn btn-outline-primary btn-sm">Русские</a>
            <a href="{% url 'book_en' %}" class="btn btn-outline-primary btn-sm">Английские</a>
            <a href="{% url 'book_usa' %}" class="btn btn-outline-primary btn-sm">Американские</a>
            <a href="{% url 'tour_list' %}" class="btn btn-outline-success btn-sm">Туры</a>
        </div>

        <!-- Список книг -->
        <div class="row">
            {% for book in books %}
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">{{ book.title }}</h5>
                        <h6 class="card-subtitle text-muted">Автор: {{ book.author }}</h6>
                        <p class="card-text mt-2">{{ book.description|truncatewords:20 }}</p>
                        
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="badge bg-secondary">
                                {{ book.reviews.count }} отзывов
                            </span>
                            <a href="{% url 'book_detail' book.id %}" class="btn btn-primary btn-sm">
                                Подробнее
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12">
                <div class="alert alert-info">Книги не найдены</div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
