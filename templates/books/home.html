<!DOCTYPE html>
<html>
<head>
    <title>Главная - Библиотека и Туры</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 class="text-center">📚 Библиотека & 🏇 Конные Туры</h1>
        
        <div class="row text-center mt-4">
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body">
                        <h5>Книги</h5>
                        <h3>{{ books_count }}</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body">
                        <h5>Туры</h5>
                        <h3>{{ tours_count }}</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body">
                        <h5>Отзывы</h5>
                        <h3>{{ reviews_count }}</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body">
                        <h5>Регистрации</h5>
                        <h3>{{ registrations_count }}</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="{% url 'book_ru' %}" class="btn btn-primary me-2">Русские книги</a>
            <a href="{% url 'book_en' %}" class="btn btn-primary me-2">Английские книги</a>
            <a href="{% url 'book_usa' %}" class="btn btn-primary me-2">Американские книги</a>
            <a href="{% url 'tour_list' %}" class="btn btn-success">Конные туры</a>
        </div>
    </div>
</body>
</html>
